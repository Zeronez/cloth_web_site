      CELERY_NOTIFICATION_RETRY_MAX_SECONDS: ${CELERY_NOTIFICATION_RETRY_MAX_SECONDS:-300}
      CELERY_NOTIFICATION_PROCESSING_LEASE_SECONDS: ${CELERY_NOTIFICATION_PROCESSING_LEASE_SECONDS:-600}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://${APP_DOMAIN:?Set APP_DOMAIN before starting VPS services}
      NEXT_PUBLIC_API_PREFIX: ${NEXT_PUBLIC_API_PREFIX:-/api/v1}
      NEXT_PUBLIC_SITE_URL: https://${APP_DOMAIN:?Set APP_DOMAIN before starting VPS services}
      NEXT_PUBLIC_SUPPORT_EMAIL: ${NEXT_PUBLIC_SUPPORT_EMAIL:-}
      NEXT_PUBLIC_SUPPORT_PHONE: ${NEXT_PUBLIC_SUPPORT_PHONE:-}
      NEXT_PUBLIC_SUPPORT_TELEGRAM: ${NEXT_PUBLIC_SUPPORT_TELEGRAM:-}
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/healthz').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  backend_static:
  backend_media:
  caddy_data:
  caddy_config:
