services:
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?Set APP_DOMAIN before starting VPS services}
      ACME_EMAIL: ${ACME_EMAIL:?Set ACME_EMAIL before starting VPS services}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - backend_static:/srv/static:ro
      - backend_media:/srv/media:ro

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-animeattire}
      POSTGRES_USER: ${POSTGRES_USER:-animeattire}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD before starting VPS services}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    command:
      - gunicorn
      - config.wsgi:application
      - --bind
      - 0.0.0.0:8000
      - --workers
      - "3"
      - --timeout
      - "60"
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.production}
      DEBUG: ${DEBUG:-0}
      DATABASE_URL: postgres://${POSTGRES_USER:-animeattire}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD before starting VPS services}@postgres:5432/${POSTGRES_DB:-animeattire}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?Set ALLOWED_HOSTS before starting VPS services}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:?Set CSRF_TRUSTED_ORIGINS before starting VPS services}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?Set CORS_ALLOWED_ORIGINS before starting VPS services}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY before starting VPS services}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-AnimeAttire <no-reply@example.com>}
      SERVER_EMAIL: ${SERVER_EMAIL:-AnimeAttire <no-reply@example.com>}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:?Set EMAIL_HOST before starting VPS services}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:?Set EMAIL_HOST_USER before starting VPS services}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:?Set EMAIL_HOST_PASSWORD before starting VPS services}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-1}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-0}
      EMAIL_TIMEOUT: ${EMAIL_TIMEOUT:-10}
      FRONTEND_APP_URL: "https://${APP_DOMAIN:?Set APP_DOMAIN before starting VPS services}"
      AUTH_EMAIL_CONFIRMATION_PATH: ${AUTH_EMAIL_CONFIRMATION_PATH:-/auth/confirm-email}
      AUTH_PASSWORD_RESET_PATH: ${AUTH_PASSWORD_RESET_PATH:-/auth/reset-password}
      PRIVACY_POLICY_VERSION: ${PRIVACY_POLICY_VERSION:-2026-05}
      OFFER_AGREEMENT_VERSION: ${OFFER_AGREEMENT_VERSION:-2026-05}
      MARKETING_CONSENT_VERSION: ${MARKETING_CONSENT_VERSION:-2026-05}
      AVATAR_UPLOAD_MAX_BYTES: ${AVATAR_UPLOAD_MAX_BYTES:-2097152}
      PRODUCT_IMAGE_UPLOAD_MAX_BYTES: ${PRODUCT_IMAGE_UPLOAD_MAX_BYTES:-8388608}
      IMAGE_UPLOAD_MAX_PIXELS: ${IMAGE_UPLOAD_MAX_PIXELS:-16000000}
      CONTENT_SECURITY_POLICY: "${CONTENT_SECURITY_POLICY:-default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'}"
      CONTENT_SECURITY_POLICY_REPORT_ONLY: ${CONTENT_SECURITY_POLICY_REPORT_ONLY:-0}
      AUTH_LOGIN_FAILURE_WINDOW_SECONDS: ${AUTH_LOGIN_FAILURE_WINDOW_SECONDS:-900}
      AUTH_LOGIN_FAILURE_IP_LIMIT: ${AUTH_LOGIN_FAILURE_IP_LIMIT:-5}
      AUTH_LOGIN_FAILURE_ACCOUNT_LIMIT: ${AUTH_LOGIN_FAILURE_ACCOUNT_LIMIT:-10}
      AUTH_PASSWORD_RESET_REQUEST_WINDOW_SECONDS: ${AUTH_PASSWORD_RESET_REQUEST_WINDOW_SECONDS:-3600}
      AUTH_PASSWORD_RESET_REQUEST_LIMIT: ${AUTH_PASSWORD_RESET_REQUEST_LIMIT:-3}
      AUTH_PASSWORD_RESET_CONFIRM_WINDOW_SECONDS: ${AUTH_PASSWORD_RESET_CONFIRM_WINDOW_SECONDS:-3600}
      AUTH_PASSWORD_RESET_CONFIRM_LIMIT: ${AUTH_PASSWORD_RESET_CONFIRM_LIMIT:-5}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-us-east-1}
      PAYMENT_WEBHOOK_BYPASS_PROVIDERS: ${PAYMENT_WEBHOOK_BYPASS_PROVIDERS:-}
      PAYMENT_WEBHOOK_SECRETS_JSON: "${PAYMENT_WEBHOOK_SECRETS_JSON:?Set PAYMENT_WEBHOOK_SECRETS_JSON before starting VPS services}"
      PAYMENT_WEBHOOK_SIGNATURE_HEADERS_JSON: "${PAYMENT_WEBHOOK_SIGNATURE_HEADERS_JSON:-{}}"
      PAYMENT_PROVIDER_CONFIRMATION_URLS_JSON: "${PAYMENT_PROVIDER_CONFIRMATION_URLS_JSON:?Set PAYMENT_PROVIDER_CONFIRMATION_URLS_JSON before starting VPS services}"
      PAYMENT_PROVIDER_RETURN_BASE_URL: "https://${APP_DOMAIN:?Set APP_DOMAIN before starting VPS services}/checkout/return"
      PAYMENT_PROVIDER_STATUS_OVERRIDES_JSON: "${PAYMENT_PROVIDER_STATUS_OVERRIDES_JSON:-{}}"
      DELIVERY_METHOD_AVAILABILITY_OVERRIDES_JSON: "${DELIVERY_METHOD_AVAILABILITY_OVERRIDES_JSON:-{}}"
      DELIVERY_PROVIDER_TRACKING_OVERRIDES_JSON: "${DELIVERY_PROVIDER_TRACKING_OVERRIDES_JSON:-{}}"
      DELIVERY_PICKUP_POINT_OVERRIDES_JSON: "${DELIVERY_PICKUP_POINT_OVERRIDES_JSON:-{}}"
      PAYMENT_SESSION_TIMEOUT_MINUTES: ${PAYMENT_SESSION_TIMEOUT_MINUTES:-20}
      PAYMENT_EXPIRATION_BATCH_SIZE: ${PAYMENT_EXPIRATION_BATCH_SIZE:-100}
      PAYMENT_EXPIRATION_SCHEDULE_MINUTES: ${PAYMENT_EXPIRATION_SCHEDULE_MINUTES:-5}
      CART_GUEST_TTL_HOURS: ${CART_GUEST_TTL_HOURS:-72}
      CART_CLEANUP_BATCH_SIZE: ${CART_CLEANUP_BATCH_SIZE:-200}
      GUEST_CART_CLEANUP_SCHEDULE_MINUTES: ${GUEST_CART_CLEANUP_SCHEDULE_MINUTES:-60}
      CELERY_TASK_DEFAULT_QUEUE: ${CELERY_TASK_DEFAULT_QUEUE:-default}
      CELERY_NOTIFICATION_QUEUE: ${CELERY_NOTIFICATION_QUEUE:-notifications}
      CELERY_TASK_TIME_LIMIT: ${CELERY_TASK_TIME_LIMIT:-300}
      CELERY_WORKER_PREFETCH_MULTIPLIER: ${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
      CELERY_NOTIFICATION_MAX_RETRIES: ${CELERY_NOTIFICATION_MAX_RETRIES:-3}
      CELERY_NOTIFICATION_RETRY_BACKOFF_SECONDS: ${CELERY_NOTIFICATION_RETRY_BACKOFF_SECONDS:-30}
      CELERY_NOTIFICATION_RETRY_MAX_SECONDS: ${CELERY_NOTIFICATION_RETRY_MAX_SECONDS:-300}
      CELERY_NOTIFICATION_PROCESSING_LEASE_SECONDS: ${CELERY_NOTIFICATION_PROCESSING_LEASE_SECONDS:-600}
      HEALTH_CHECK_CELERY_ENABLED: ${HEALTH_CHECK_CELERY_ENABLED:-1}
      HEALTH_CHECK_CELERY_RESULT_BACKEND_ENABLED: ${HEALTH_CHECK_CELERY_RESULT_BACKEND_ENABLED:-1}
      HEALTH_CHECK_CELERY_WORKERS_ENABLED: ${HEALTH_CHECK_CELERY_WORKERS_ENABLED:-0}
      HEALTH_CHECK_CELERY_MIN_WORKERS: ${HEALTH_CHECK_CELERY_MIN_WORKERS:-1}
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live/', timeout=3).read()",
        ]
      interval: 20s
      timeout: 5s
      retries: 5

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
