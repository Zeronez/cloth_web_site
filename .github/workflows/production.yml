name: Production CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  CI: "true"
  FORCE_COLOR: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

concurrency:
  group: production-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linting:
    name: Job 1 - Linting
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint backend
        working-directory: backend
        run: |
          ruff check .
          black --check .

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Enable Corepack
        run: corepack enable

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm install --frozen-lockfile; \
          elif [ -f yarn.lock ]; then yarn install --frozen-lockfile; \
          elif [ -f package-lock.json ]; then npm ci; \
          else npm install; fi

      - name: Lint frontend
        working-directory: frontend
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm lint; \
          elif [ -f yarn.lock ]; then yarn lint; \
          else npm run lint; fi

  testing:
    name: Job 2 - Testing
    runs-on: ubuntu-latest
    needs: linting
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: animeattire_test
          POSTGRES_USER: animeattire
          POSTGRES_PASSWORD: animeattire
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U animeattire -d animeattire_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DATABASE_URL: postgres://animeattire:animeattire@localhost:5432/animeattire_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      SECRET_KEY: ci-secret-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Django system checks
        working-directory: backend
        run: python manage.py check

      - name: Check Django migrations
        working-directory: backend
        run: python manage.py makemigrations --check --dry-run

      - name: Apply Django migrations
        working-directory: backend
        run: python manage.py migrate --noinput

      - name: Run Celery Redis smoke test
        working-directory: backend
        env:
          RUN_CELERY_SERVICE_SMOKE: "true"
        run: pytest tests/test_celery_services.py -q

      - name: Run backend tests
        working-directory: backend
        run: pytest

      - name: Upload backend diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-diagnostics-${{ github.run_attempt }}
          path: |
            backend/.coverage
            backend/coverage.xml
            backend/htmlcov/**
            backend/.pytest_cache/**
            backend/**/*.log
            backend/logs/**
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 14

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Enable Corepack
        run: corepack enable

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm install --frozen-lockfile; \
          elif [ -f yarn.lock ]; then yarn install --frozen-lockfile; \
          elif [ -f package-lock.json ]; then npm ci; \
          else npm install; fi

      - name: Run frontend tests
        working-directory: frontend
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm test -- --watch=false; \
          elif [ -f yarn.lock ]; then yarn test --watch=false; \
          else npm test; fi

      - name: Upload frontend diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-diagnostics-${{ github.run_attempt }}
          path: |
            frontend/coverage/**
            frontend/junit*.xml
            frontend/test-results/**
            frontend/playwright-report/**
            frontend/npm-debug.log*
            frontend/yarn-debug.log*
            frontend/yarn-error.log*
            frontend/pnpm-debug.log*
            frontend/**/*.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Collect service diagnostics
        if: failure()
        continue-on-error: true
        run: |
          mkdir -p diagnostics
          docker ps -a > diagnostics/docker-ps.txt
          for container in $(docker ps -aq); do
            name="$(docker inspect --format='{{.Name}}' "$container" | sed 's#^/##')"
            docker logs "$container" > "diagnostics/${name}.log" 2>&1 || true
          done

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-diagnostics-${{ github.run_attempt }}
          path: diagnostics/**
          if-no-files-found: ignore
          retention-days: 14

  build:
    name: Job 3 - Build
    runs-on: ubuntu-latest
    needs: testing
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile backend

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile frontend
